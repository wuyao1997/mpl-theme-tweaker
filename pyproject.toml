[project]
name = "mpl-theme-tweaker"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "dearpygui>=2.1.0",
]

[dependency-groups]
dev = [
    "mypy>=1.18.2",
    "pre-commit>=4.4.0",
    "pyinstaller>=6.16.0",
    "pytest>=9.0.0",
    "ruff>=0.14.4",
    "setuptools-scm>=9.2.2",
]


[project.urls]
Repository = "https://github.com/pplotter/mpl-theme-tweaker"


[tool.setuptools_scm]
fallback_version = "0.0.0"
write_to = "src/pplotter/_version.py"
# write_to_template = "__version__ = \"{version}\"\n" # deprecated

[tool.setuptools]
include-package-data = true

[tool.ruff]
src = ["src"]
line-length = 88
exclude = [
    "src/pplotter/_version.py",  # generated by setuptools-scm
]


[tool.ruff.format]


[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]

ignore = [
    "UP045", # x | None
    "F401", # unused import
    "B905", # zip(a,b)
]


[tool.mypy]
disable_error_code = ["import-untyped", "no-redef"]
